# Same-origin reverse proxy: /api -> FastAPI, everything else -> Next.js. The browser only ever
# talks to this proxy, so the session cookie stays first-party and there is no CORS.
#
# ON THE SERVER: add TLS here (listen 443 ssl; ssl_certificate ...; redirect 80 -> 443) and set
# ENVIRONMENT=prod in .env so the session cookie is marked Secure. Over plain http (local) keep
# ENVIRONMENT=dev, or the Secure cookie will not be stored and login will silently fail.
server {
    listen 80;
    server_name _;
    client_max_body_size 100m;   # medical-record PDF uploads

    # Docker's embedded DNS. Resolving the upstream through a variable forces nginx to re-resolve
    # per request, so recreating the api/web container (new IP on `docker compose up -d`) never
    # leaves the proxy holding a stale IP - otherwise the next request 502s until the proxy is
    # restarted too.
    resolver 127.0.0.11 valid=10s ipv6=off;

    location /api/ {
        set $upstream_api api:8000;
        proxy_pass http://$upstream_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;   # sync AI routes (export, bundle summarize) can run long
    }

    location / {
        set $upstream_web web:3000;
        proxy_pass http://$upstream_web;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
