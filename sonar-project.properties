# SonarQube Cloud (SonarCloud) CI-based analysis config.
# CI-based analysis is required to import coverage (Automatic Analysis cannot).
# Disable Automatic Analysis in the project's Administration > Analysis Method,
# else the CI scan fails: "running CI analysis while Automatic Analysis is enabled".
sonar.projectKey=gesco-healthcare-support_ai-medical-record-review
sonar.organization=gesco-healthcare-support

# main is the rewrite: backend/ (FastAPI) + frontend/ (Next.js). The legacy Flask app (mrr_ai/)
# is being phased out and is no longer analyzed.
sonar.sources=backend/app,frontend/app,frontend/components,frontend/hooks,frontend/lib
sonar.tests=backend/tests

sonar.python.version=3.12
sonar.python.coverage.reportPaths=backend/coverage.xml
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info

# frontend/app (Next.js routes/pages) is analyzed for issues but exercised by Playwright E2E, not
# unit tests, so it has no lcov coverage. Exclude it from the coverage ratio so the new-code gate
# is honest (it never demands unit coverage for E2E-only route files).
sonar.coverage.exclusions=frontend/app/**

# Not our source / generated / vendored / test files (frontend colocates *.test.tsx with source,
# so exclude them from source analysis; coverage still maps to the source they exercise).
sonar.exclusions=mrr_ai/**,experiments/**,frontend/.next/**,frontend/node_modules/**,frontend/public/pdfjs/**,frontend/e2e/**,**/*.test.ts,**/*.test.tsx,**/__pycache__/**
# Test setup is intentionally repetitive; do not flag it as duplication.
sonar.cpd.exclusions=backend/tests/**

# Fail the CI job when the quality gate fails (enforce the gate in CI).
sonar.qualitygate.wait=true
