name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Pyright (advisory while code is untyped)
        run: uv run pyright
        continue-on-error: true

      - name: Import smoke test
        env:
          GEMINI_API_KEY: dummy-ci-key
          OPENAI_API_KEY: dummy-ci-key
        run: uv run python -c "import app; print('import OK')"

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # The gitleaks GitHub Action requires a paid license for organizations; the
      # gitleaks OSS binary does not. Pinned to the same version as the pre-commit hook.
      - name: gitleaks (OSS binary)
        run: |
          curl -sSL -o gitleaks.tar.gz \
            https://github.com/gitleaks/gitleaks/releases/download/v8.30.0/gitleaks_8.30.0_linux_x64.tar.gz
          tar -xzf gitleaks.tar.gz gitleaks
          ./gitleaks dir . --redact --no-banner --exit-code 1

  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history improves SonarCloud reporting relevance

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Pytest with coverage
        env:
          GEMINI_API_KEY: dummy-ci-key
          OPENAI_API_KEY: dummy-ci-key
        run: >-
          uv run pytest
          --cov=mrr_ai
          --cov-report=xml
          --cov-report=term-missing
          --cov-fail-under=85

      - name: SonarQube Cloud scan
        uses: SonarSource/sonarqube-scan-action@v8.2.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
