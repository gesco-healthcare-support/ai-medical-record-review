# Quality gates. Install once: uv run pre-commit install
# Revs are pinned by `pre-commit autoupdate`.

# Vendored third-party code (PDF.js viewer) is not ours to lint/format, and its
# multi-MB bundles are not patient PDFs - skip all hooks there. The large-file
# guard still protects every path we author.
exclude: ^(mrr_ai/static/vendor/|frontend/public/pdfjs/)

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.17
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format

  # Secret scanning (PHI/credentials safety - this repo's biggest risk).
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.0
    hooks:
      - id: gitleaks

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: detect-private-key
      - id: check-added-large-files   # blocks accidental patient-PDF commits
        args: [--maxkb=1024]
      - id: check-merge-conflict
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-toml
      - id: check-yaml
