<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MRR - review</title>
    <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='vendor/fonts/fonts.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='evaluators.css') }}">
</head>
<body data-doc-id="{{ document_id }}">
<header class="ev-topbar">
    <a class="ev-crest-chip" href="/" title="Back to your documents">
        <img src="{{ url_for('static', filename='assets/evaluators-crest.png') }}" alt="Evaluators crest">
    </a>
    <span class="ev-wordmark">EVALUATORS</span>
    <span class="ev-topbar-divider"></span>
    <span class="ev-topbar-app">Medical Record Review</span>
    <nav class="ev-topbar-nav">
        <a href="/" title="Back to your documents">My documents</a>
        <a href="/diagnostics" title="Diagnostic &amp; Operative bundle">Diagnostic &amp; Operative</a>
        <a href="/depositions" title="Deposition bundle">Depositions</a>
        <a href="/classic" title="The original pages UI">Classic UI</a>
        <a href="/logout" title="Sign out">Log out</a>
    </nav>
</header>

<nav class="ev-stepper" aria-label="Pipeline steps">
    <div class="ev-step" data-step="identify" title="Run or re-run document identification">
        <span class="ev-step-circle" data-num="1"></span>
        <span class="ev-step-label">Identify documents</span>
    </div>
    <span class="ev-step-line"></span>
    <div class="ev-step" data-step="review" title="Correct the identified documents">
        <span class="ev-step-circle" data-num="2"></span>
        <span class="ev-step-label">Review &amp; correct</span>
    </div>
    <span class="ev-step-line"></span>
    <div class="ev-step" data-step="summaries" title="Read, edit, and export the summaries">
        <span class="ev-step-circle" data-num="3"></span>
        <span class="ev-step-label">Summaries</span>
    </div>
</nav>

<div id="banner" class="banner hidden"></div>

<main>
    {% include "_doc_editor.html" %}

    <!-- summaries -->
    <section id="step-summaries" class="hidden">
        <div class="sum-column">
            <div class="sum-header">
                <div>
                    <h1>Summaries</h1>
                    <div class="sum-countline">
                        <span id="summaryCount"></span>
                        <span id="summarySaveState"></span>
                    </div>
                </div>
                <button id="exportBtn" class="ev-btn ev-btn-primary" type="button">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><path d="M7 10l5 5 5-5"></path><path d="M12 15V3"></path></svg>
                    Export to Word
                </button>
            </div>
            <div id="summaryList" class="summary-list"></div>
            <div id="summaryPagerBottom" class="ev-pager hidden"></div>
        </div>
    </section>
</main>

<!-- export dialog: the four Word-header fields, shown on Export to Word -->
<div id="exportDialog" class="ev-dialog-backdrop hidden">
    <div class="ev-dialog" role="dialog" aria-modal="true" aria-labelledby="exportDialogTitle">
        <div class="ev-dialog-head">
            <div>
                <h2 id="exportDialogTitle">Export to Word</h2>
                <p id="exportDialogNote" class="ev-dialog-sub"></p>
            </div>
            <button id="exportDialogClose" class="ev-dialog-x" type="button" aria-label="Close">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
            </button>
        </div>
        <div class="ev-dialog-row">
            <div class="ev-field-2">
                <label class="ev-lbl" for="expPatient">Patient name</label>
                <input id="expPatient" class="ev-inp" placeholder="Full name">
            </div>
            <div class="ev-field-1">
                <label class="ev-lbl" for="expDob">DOB</label>
                <input id="expDob" class="ev-inp" placeholder="MM/DD/YYYY">
            </div>
        </div>
        <div>
            <label class="ev-lbl" for="expQme">Evaluation type (QME / AME)</label>
            <input id="expQme" class="ev-inp" value="PANEL QUALIFIED MEDICAL EVALUATION (ML-10*-)">
        </div>
        <div>
            <label class="ev-lbl" for="expFirm">Attorney law firm</label>
            <input id="expFirm" class="ev-inp" placeholder="Firm name">
        </div>
        <div class="ev-dialog-foot">
            <span id="exportError" class="error-text"></span>
            <button id="exportCancel" class="ev-btn ev-btn-ghost" type="button">Cancel</button>
            <button id="exportConfirm" class="ev-btn ev-btn-primary" type="button">Export</button>
        </div>
    </div>
</div>

<script src="{{ url_for('static', filename='review.js') }}"></script>
</body>
</html>
